name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel older runs on the same PR when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Unit + integration tests (pytest)
        run: pytest tests/backend --cov=backend --cov-report=term-missing

  frontend:
    name: Frontend (vitest + tsc + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests (vitest)
        run: npm test

      - name: Production build
        run: npm run build

  precommit:
    name: Pre-commit hygiene (scripts/precommit.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the full history for `git diff --cached` simulation below.
          fetch-depth: 0

      - name: Set up Python (for py_compile check)
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Simulate staged changes on HEAD^..HEAD
        # The pre-commit script reads `git diff --cached` which only sees
        # staged-but-unmerged files. On CI we want to check what this commit
        # added/modified against its parent — so we stage HEAD's diff first.
        run: |
          git reset --soft HEAD~1 || echo "single-commit repo, skipping reset"
          git status --short
          bash scripts/precommit.sh
